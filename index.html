<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Sheets and Trackers</title>
<style>
:root {
  --bg: #f5f7fb;
  --card: #ffffff;
  --primary: #4f46e5;
  --text: #1f2937;
  --muted: #6b7280;
  --danger: #dc2626;
  --danger-bg: #fef2f2;
  --danger-border: #fca5a5;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Inter, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.header {
  background: var(--primary);
  color: #fff;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  font-size: 24px;
  font-weight: 600;
}

.header-actions {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  gap: 8px;
}

.header-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.4);
  color: #fff;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 500;
}

.header-btn:hover { background: rgba(255,255,255,0.25); }

.toolbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  padding: 15px;
  justify-content: space-between;
  align-items: center;
}

.toolbar input,
.toolbar select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  flex: 1;
  min-width: 160px;
  font-size: 14px;
}

.form {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  padding: 0 15px 15px;
}

.form input,
.form select {
  flex: 1;
  min-width: 130px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
}

.form button {
  padding: 10px 18px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  white-space: nowrap;
}

.form button:hover { background: #4338ca; }

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
  padding: 0 20px 30px;
}

.card {
  background: var(--card);
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transition: transform .2s;
  position: relative;
}

.card:hover { transform: translateY(-6px); }

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 6px;
}

.title {
  font-size: 18px;
  font-weight: 600;
  outline: none;
  flex: 1;
  word-break: break-word;
}

.title:focus {
  background: #f3f4f6;
  border-radius: 4px;
  padding: 2px 4px;
}

/* 3-dot menu */
.menu-wrapper {
  position: relative;
  flex-shrink: 0;
}

.dots-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 6px;
  border-radius: 6px;
  font-size: 18px;
  color: var(--muted);
  line-height: 1;
  display: flex;
  align-items: center;
  transition: background .15s;
}

.dots-btn:hover {
  background: #f3f4f6;
  color: var(--text);
}

.dropdown {
  display: none;
  position: absolute;
  right: 0;
  top: calc(100% + 4px);
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  z-index: 100;
  min-width: 130px;
  overflow: hidden;
}

.dropdown.open { display: block; }

.dropdown-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  font-size: 14px;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  transition: background .12s;
}

.dropdown-item:hover { background: #f9fafb; }

.dropdown-item.danger {
  color: var(--danger);
}

.dropdown-item.danger:hover {
  background: var(--danger-bg);
}

.desc {
  margin: 8px 0 12px;
  color: var(--muted);
  font-size: 14px;
  outline: none;
  word-break: break-word;
}

.desc:focus {
  background: #f3f4f6;
  border-radius: 4px;
  padding: 2px 4px;
}

.button {
  display: inline-block;
  padding: 8px 14px;
  background: var(--primary);
  color: #fff;
  text-decoration: none;
  border-radius: 8px;
  font-size: 14px;
}

.button:hover { background: #4338ca; }

.status-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
}

.status-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  text-transform: capitalize;
}

.badge-active    { background: #d1fae5; color: #065f46; }
.badge-pending   { background: #fef3c7; color: #92400e; }
.badge-completed { background: #f3f4f6; color: #374151; }

.status-select {
  padding: 5px 8px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 13px;
  cursor: pointer;
  background: #fff;
  color: var(--text);
}

.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 50px 20px;
  color: var(--muted);
  font-size: 16px;
}

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1f2937;
  color: #fff;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s, transform .25s;
  z-index: 1000;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<div class="header">
  📊 All Sheets and Trackers
  <div class="header-actions">
    <button class="header-btn" onclick="exportData()" title="Download your cards as a JSON file">⬇ Export</button>
    <button class="header-btn" onclick="document.getElementById('importFile').click()" title="Load cards from a JSON file">⬆ Import</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
  </div>
</div>

<div class="toolbar">
  <input type="text" id="search" placeholder="Search projects..." oninput="filterCards()">
  <select id="statusFilter" onchange="filterCards()">
    <option value="all">All Status</option>
    <option value="active">Active</option>
    <option value="pending">Pending</option>
    <option value="completed">Completed</option>
  </select>
</div>

<div class="form">
  <input type="text" id="newTitle" placeholder="Title">
  <input type="text" id="newDesc" placeholder="Description">
  <input type="text" id="newLink" placeholder="Link (Sheet or Dashboard)">
  <select id="newStatus">
    <option value="active">Active</option>
    <option value="pending">Pending</option>
    <option value="completed">Completed</option>
  </select>
  <button onclick="addCard()">+ Add Card</button>
</div>

<div class="container" id="cards"></div>

<div class="toast" id="toast"></div>

<script>
let cardsData = JSON.parse(localStorage.getItem('cardsData')) || [];

function saveData() {
  localStorage.setItem('cardsData', JSON.stringify(cardsData));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => t.classList.remove('show'), 2600);
}

/* ---------------- Export / Import (manual cross-device sync) ---------------- */

function exportData() {
  const blob = new Blob([JSON.stringify(cardsData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `trackers-dashboard-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('Downloaded. Move this file to your other device and use Import there.');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    let incoming;
    try {
      incoming = JSON.parse(e.target.result);
      if (!Array.isArray(incoming)) throw new Error('not an array');
    } catch (err) {
      alert('That file doesn\'t look like a valid export from this dashboard.');
      event.target.value = '';
      return;
    }

    const hasExisting = cardsData.length > 0;
    const replace = !hasExisting || confirm(
      `Import ${incoming.length} card(s).\n\n` +
      `Click OK to REPLACE your current ${cardsData.length} card(s), ` +
      `or Cancel to MERGE (add the new ones, keep existing).`
    );

    if (replace) {
      cardsData = incoming;
    } else {
      // Merge: skip cards that look identical (same title + link)
      const existingKeys = new Set(cardsData.map(c => c.title + '|' + c.link));
      incoming.forEach(c => {
        const key = c.title + '|' + c.link;
        if (!existingKeys.has(key)) {
          cardsData.push(c);
          existingKeys.add(key);
        }
      });
    }

    saveData();
    renderCards();
    showToast(replace ? 'Import complete — replaced your cards.' : 'Import complete — merged new cards in.');
    event.target.value = '';
  };
  reader.readAsText(file);
}

function badgeClass(status) {
  return status === 'active' ? 'badge-active' : status === 'pending' ? 'badge-pending' : 'badge-completed';
}

function closeAllMenus() {
  document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
}

function toggleMenu(idx, event) {
  event.stopPropagation();
  const menu = document.getElementById('menu-' + idx);
  const wasOpen = menu.classList.contains('open');
  closeAllMenus();
  if (!wasOpen) menu.classList.add('open');
}

document.addEventListener('click', closeAllMenus);

function renderCards() {
  const sf = document.getElementById('statusFilter').value;
  const sq = document.getElementById('search').value.toLowerCase();
  const container = document.getElementById('cards');

  const filtered = cardsData
    .map((card, idx) => ({ card, idx }))
    .filter(({ card }) => {
      const matchStatus = sf === 'all' || card.status === sf;
      const matchSearch = card.title.toLowerCase().includes(sq) || (card.desc || '').toLowerCase().includes(sq);
      return matchStatus && matchSearch;
    });

  if (!filtered.length) {
    container.innerHTML = '<div class="empty">No cards found. Try a different search or filter.</div>';
    return;
  }

  container.innerHTML = filtered.map(({ card, idx }) => `
    <div class="card" data-status="${card.status}">
      <div class="card-header">
        <div class="title" contenteditable="true" onblur="updateCard(${idx}, 'title', this.innerText)">${card.title}</div>
        <div class="menu-wrapper">
          <button class="dots-btn" onclick="toggleMenu(${idx}, event)" title="Options">⋮</button>
          <div class="dropdown" id="menu-${idx}">
            <button class="dropdown-item danger" onclick="deleteCard(${idx})">🗑 Delete card</button>
          </div>
        </div>
      </div>
      <div class="desc" contenteditable="true" onblur="updateCard(${idx}, 'desc', this.innerText)">${card.desc || ''}</div>
      <a class="button" href="${card.link}" target="_blank">Open ↗</a>
      <div class="status-row">
        <span class="status-badge ${badgeClass(card.status)}">${card.status}</span>
        <select class="status-select" onchange="changeStatus(${idx}, this.value)">
          <option value="active"    ${card.status === 'active'    ? 'selected' : ''}>Active</option>
          <option value="pending"   ${card.status === 'pending'   ? 'selected' : ''}>Pending</option>
          <option value="completed" ${card.status === 'completed' ? 'selected' : ''}>Completed</option>
        </select>
      </div>
    </div>
  `).join('');
}

function addCard() {
  const title  = document.getElementById('newTitle').value.trim();
  const desc   = document.getElementById('newDesc').value.trim();
  const link   = document.getElementById('newLink').value.trim();
  const status = document.getElementById('newStatus').value;

  if (!title || !link) { alert('Title and link are required.'); return; }

  cardsData.push({ title, desc, link, status });
  saveData();
  renderCards();

  document.getElementById('newTitle').value  = '';
  document.getElementById('newDesc').value   = '';
  document.getElementById('newLink').value   = '';
  document.getElementById('newStatus').value = 'active';
}

function deleteCard(idx) {
  closeAllMenus();
  if (!confirm(`Delete "${cardsData[idx].title}"?\n\nThis cannot be undone.`)) return;
  cardsData.splice(idx, 1);
  saveData();
  renderCards();
}

function updateCard(idx, field, value) {
  cardsData[idx][field] = value.trim();
  saveData();
}

function changeStatus(idx, value) {
  cardsData[idx].status = value;
  saveData();
  renderCards();
}

function filterCards() { renderCards(); }

renderCards();
</script>

</body>
</html>
